name: Earnings Data Refresh

on:
  schedule:
    # Every 3 hours (00:00, 03:00, 06:00, … UTC). GitHub may delay scheduled
    # jobs by several minutes under load.
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh earnings data
        run: python scripts/scheduler.py --once

      # data/earnings_intelligence.db is intentionally committed to the repo
      # (see DEPLOYMENT.md): Streamlit Community Cloud has no persistent disk,
      # so this commit is what makes the deployed dashboard pick up fresh data
      # automatically. Only commits when the database actually changed.
      - name: Commit refreshed database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/earnings_intelligence.db
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Automated data refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      # Also kept as a downloadable artifact for convenience / debugging.
      - name: Upload refreshed database
        uses: actions/upload-artifact@v4
        with:
          name: earnings-intelligence-database
          path: data/earnings_intelligence.db
          if-no-files-found: error
